<div class="contenedor">
  <div class="formulario">
    <h2>IMC</h2>
    <p>Ingrese los datos de la persona.</p>

    <label>Nombre</label>
    <input type="text" [(ngModel)]="nombre" placeholder="Ingrese su nombre">
    <label>Correo</label>
    <input type="email" name="correo" [(ngModel)]="correo" placeholder="Ingrese su correo" required>  
    <label>Altura</label>
    <input type="number" [(ngModel)]="altura" max="400" placeholder="Ingrese su altura en metros">
    <label>Peso</label>
    <input type="number" [(ngModel)]="peso" max="200" placeholder="Ingrese su peso en kg">  

    <div class="botones">
      <button (click)="procesar()">Procesar</button>
      <button class="limpiar" (click)="limpiar()">Limpiar</button>
    </div>
    <label>{{mensaje}}</label>
  </div>

  <div class="resultados">
    <h3>Informacion IMC</h3>
    
    <p>Nombre: <strong>{{ nombre }}</strong></p>
    <p>Correo: <strong>{{ correo }}</strong></p>
    <p>Peso: <strong>{{ peso }}</strong></p>
    <p>Altura: <strong>{{ altura }}</strong></p>
    <p>IMC: <strong>{{ imc }}</strong></p>
    <p>Diagnostico: <strong>{{ diagnostico }}</strong></p>
  </div>
</div>
