<div class="contenedor">
  <div class="formulario">
    <h2>Boleta de productos</h2>
    <p>Ingrese los datos del producto para calcular la boleta.</p>

    <label>Producto</label>
    <input type="text" [(ngModel)]="producto">

    <label>Precio</label>
    <input type="number" [(ngModel)]="precio" min="1">

    <label>Cantidad</label>
    <input type="number" [(ngModel)]="cantidad" min="1">

    <div class="botones">
      <button (click)="procesar()">Procesar</button>
      <button class="limpiar" (click)="limpiar()">Limpiar</button>
    </div>
  </div>

  <div class="resultados">
    <h3>Boleta</h3>

    <p>Producto: <strong>{{ producto }}</strong></p>
    <p>Precio: <strong>S/ {{ precio }}</strong></p>
    <p>Cantidad: <strong>{{ cantidad }}</strong></p>
    <p>Subtotal: <strong>S/ {{ subtotal }}</strong></p>
    <p>IGV 18%: <strong>S/ {{ igv }}</strong></p>
    <p>Descuento: <strong>S/ {{ descuento }}</strong></p>
    <p class="total">Total: <strong>S/ {{ total }}</strong></p>
  </div>
</div>
