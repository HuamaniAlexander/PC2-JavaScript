<div class="contenedor">
    <div class="formulario">
        <h2>Calculo de notas</h2>
        <p>Ingrese cuatro notas</p>
        <input type="number" [value]="nota1" (input)="validarNota($event, 'nota1')">
        <input type="number" [value]="nota2" (input)="validarNota($event, 'nota2')">
        <input type="number" [value]="nota3" (input)="validarNota($event, 'nota3')">
        <input type="number" [value]="nota4" (input)="validarNota($event, 'nota4')">

        <div class="botones">
            <button (click)="procesar()">Procesar</button>
            <button class="limpiar" (click)="limpiar()">Limpiar</button>
        </div>
    </div>

    <div class="resultados">
        <h3>Resultados</h3>

        <p>Suma: <strong>{{ suma }}</strong></p>
        <p>Promedio: <strong>{{ promedio }}</strong></p>
        <p>Estado Academico: <strong>{{ estado }}</strong></p>
        <p>Observacion: <strong>{{ observacion}}</strong></p>
        
    </div>
</div>
